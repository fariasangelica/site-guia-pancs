<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <style>
    .box { fill: #fff; stroke: #1f2937; stroke-width: 1.5; rx: 6px; }
    .title { font: 14px 'Inter', Arial, sans-serif; fill: #0f172a; }
    .small { font: 12px 'Inter', Arial, sans-serif; fill: #374151; }
    .arrow { stroke: #6b7280; stroke-width: 1.6; fill: none; marker-end: url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 L2,3 z" fill="#6b7280" />
    </marker>
  </defs>

  <!-- Start -->
  <circle cx="70" cy="60" r="20" fill="#fff" stroke="#0f172a" stroke-width="1.5" />
  <text x="70" y="65" text-anchor="middle" class="small">Início</text>

  <!-- A -->
  <rect x="150" y="30" width="180" height="40" class="box" />
  <text x="240" y="55" text-anchor="middle" class="title">Atividade A: Levantamento</text>
  <text x="240" y="70" text-anchor="middle" class="small">Duração: 4 dias</text>

  <!-- arrows -->
  <path class="arrow" d="M90,60 L150,50" />

  <!-- B, C, D -->
  <rect x="360" y="10" width="160" height="40" class="box" />
  <text x="440" y="35" text-anchor="middle" class="title">Atividade B: Requisitos</text>
  <text x="440" y="50" text-anchor="middle" class="small">Duração: 3 dias</text>

  <rect x="360" y="70" width="160" height="40" class="box" />
  <text x="440" y="95" text-anchor="middle" class="title">Atividade C: Modelagem</text>
  <text x="440" y="110" text-anchor="middle" class="small">Duração: 3 dias</text>

  <rect x="360" y="130" width="160" height="40" class="box" />
  <text x="440" y="155" text-anchor="middle" class="title">Atividade D: Backend</text>
  <text x="440" y="170" text-anchor="middle" class="small">Duração: 4 dias</text>

  <path class="arrow" d="M330,50 L360,30" />
  <path class="arrow" d="M330,60 L360,90" />
  <path class="arrow" d="M330,70 L360,150" />

  <!-- E and F -->
  <rect x="560" y="10" width="170" height="40" class="box" />
  <text x="645" y="35" text-anchor="middle" class="title">Atividade E: Frontend</text>
  <text x="645" y="50" text-anchor="middle" class="small">Duração: 5 dias</text>

  <rect x="560" y="130" width="170" height="40" class="box" />
  <text x="645" y="155" text-anchor="middle" class="title">Atividade F: Testes</text>
  <text x="645" y="170" text-anchor="middle" class="small">Duração: 1 dia</text>

  <path class="arrow" d="M520,30 L560,30" />
  <path class="arrow" d="M520,150 L560,150" />

  <!-- G and H -->
  <rect x="760" y="80" width="160" height="40" class="box" />
  <text x="840" y="105" text-anchor="middle" class="title">Atividade G: Revisão</text>
  <text x="840" y="120" text-anchor="middle" class="small">Duração: 2 dias</text>

  <rect x="960" y="40" width="160" height="40" class="box" />
  <text x="1040" y="65" text-anchor="middle" class="title">Atividade H: Deploy</text>
  <text x="1040" y="80" text-anchor="middle" class="small">Duração: 1 dia</text>

  <!-- I End -->
  <rect x="860" y="10" width="160" height="40" class="box" />
  <text x="940" y="35" text-anchor="middle" class="title">Atividade I: Entrega</text>
  <text x="940" y="50" text-anchor="middle" class="small">Duração: 3 dias</text>

  <!-- Arrows connecting -->
  <path class="arrow" d="M730,30 L760,30" />
  <path class="arrow" d="M730,150 L760,100" />
  <path class="arrow" d="M730,150 L880,30" />
  <path class="arrow" d="M880,100 L960,60" />
  <path class="arrow" d="M920,30 L960,60" />

  <!-- footer source -->
  <text x="600" y="405" text-anchor="middle" class="small">Fonte: https://robsoncamargo.com.br/blog/Diagrama-de-rede-na-gestao-de-projetos</text>
</svg>
